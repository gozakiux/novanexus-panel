name: Desplegar a GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permisos que necesita el despliegue a Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Un solo despliegue a la vez; cancela los anteriores en curso
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Construir
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Build de producción
        run: npm run build

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Publicar
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Desplegar a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
